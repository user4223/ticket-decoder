name: pypi

on: 
  push:
    branches: [42-enhancement-make-python-package-available-for-pip-and-uv-no-local-build-needed]

env:
  CONAN_HOME: "${{ github.workspace }}/conan2"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build environment and setup tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential cmake python-is-python3 python3-pip python3-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run:
          pip install uv twine conan numpy

      - name: Cache/Restore dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.arch }}-${{ runner.os }}-${{ github.workflow }}-${{ hashFiles('**/conanfile.py') }}

      - name: Build package
        run: |
          uv build

      - name: Verify package
        run: |
          twine check dist/*  

      - name: Publish package
        run: |
          twine upload dist/*
