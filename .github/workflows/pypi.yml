name: pypi

on: 
  push:
    branches: [42-enhancement-make-python-package-available-for-pip-and-uv-no-local-build-needed]

env:
  CONAN_HOME: "${{ github.workspace }}/conan2"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      PYTHON_VERSION: "3.13"
    strategy:
      matrix:
        os: [ubuntu-24.04]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build environment and setup tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential cmake python-is-python3 python3-pip python3-dev

      - name: Set up Python and build tools
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv conan>=2.28 numpy twine

      - name: Cache/Restore dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.arch }}-${{ runner.os }}-python${{ env.PYTHON_VERSION }}-${{ hashFiles('**/conanfile.py') }}

      - name: Build package
        run: uv build

      - name: Unit-Test package
        run: |
          pip install dist/ticket_decoder*.whl
          python -m unittest discover -s source/test/python/

      - name: Verify package
        run: twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.arch }}-${{ runner.os }}-python${{ env.PYTHON_VERSION }}
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
